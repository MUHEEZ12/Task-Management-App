name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install server dependencies
      run: |
        cd server
        npm ci

    - name: Install client dependencies
      run: |
        cd client
        npm ci

    - name: Run server tests
      run: |
        cd server
        npm test
      env:
        NODE_ENV: test
        MONGODB_URI: mongodb://localhost:27017/task-management-test
        JWT_SECRET: test-jwt-secret-key
        CORS_ORIGIN: http://localhost:5173
        FRONTEND_URL: http://localhost:5173

    - name: Run client tests
      run: |
        cd client
        npm test -- --watchAll=false --coverage

    - name: Build client
      run: |
        cd client
        npm run build

    - name: Build server
      run: |
        cd server
        npm run build 2>/dev/null || echo "No build script for server"

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install server dependencies
      run: |
        cd server
        npm ci

    - name: Install client dependencies
      run: |
        cd client
        npm ci

    - name: Run ESLint on server
      run: |
        cd server
        npx eslint src/ --ext .js || echo "ESLint not configured for server"

    - name: Run ESLint on client
      run: |
        cd client
        npm run lint || echo "Lint script not available"

  security:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install server dependencies
      run: |
        cd server
        npm ci

    - name: Run security audit
      run: |
        cd server
        npm audit --audit-level moderate

    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --file=server/package.json

  deploy:
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install server dependencies
      run: |
        cd server
        npm ci --production

    - name: Build client
      run: |
        cd client
        npm ci
        npm run build

    - name: Copy client build to server
      run: |
        cp -r client/dist server/public

    - name: Deploy to Railway (Server)
      if: env.RAILWAY_TOKEN != ''
      run: |
        cd server
        npx @railway/cli@latest deploy --detach
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    - name: Deploy to Vercel (Client)
      if: env.VERCEL_TOKEN != ''
      run: |
        cd client
        npx vercel --prod --yes
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    - name: Notify deployment success
      if: success()
      run: |
        echo "🚀 Deployment completed successfully!"
        echo "Server deployed to Railway"
        echo "Client deployed to Vercel"